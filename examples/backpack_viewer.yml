# ============================================================
# menus/backpack_viewer.yml
#
# 功能：查看指定玩家的背包物品（使用 player_item 功能）
# 用法：/backpack <玩家名>
#       或 /dm open backpack_viewer <玩家名>
# 示例：/backpack Notch
# ============================================================
menu_title: "&8查看 {target} 的背包"
open_command: /backpack
size: 54
args:
  - "target"
open_requirement:
  requirements:
    permission:
      type: has permission
      permission: deluxemenus.backpack
      deny_commands:
        - '[message] &c你没有权限使用此菜单！'

